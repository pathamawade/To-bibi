<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Happy Anniversary My Love 💖</title>
<!-- ใส่ข้อความพรีวิวสำหรับแสดงในไลน์โดยเฉพาะ ตรงนี้เขาจะไม่เห็นในเว็บครับ -->
<meta name="description" content="สุขสันต์วันครบรอบนะที่รัก พี่ต้องตอบให้ถูกทุกข้อนะ ไม่งั้นเค้าจะรักพี่เท่าเม็ดถั่วเขียว 🎀💕">
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ffd6e8 0%, #c6f0ff 50%, #ffd6e8 100%);
  font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
  overflow: hidden;
  position: relative;
}

/* ลอยของตกแต่งพื้นหลังปกติ */
.deco {
  position: fixed;
  font-size: 28px;
  opacity: 0.8;
  animation: float 6s ease-in-out infinite;
  z-index: 0;
  pointer-events: none;
}

@keyframes float {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
}

.deco:nth-child(odd) {
  animation-duration: 5s;
}

/* เอฟเฟกต์หัวใจลอยขึ้นจากล่างขึ้นบนตอนตอบถูก */
.floating-heart {
  position: fixed;
  bottom: -50px;
  font-size: 24px;
  user-select: none;
  pointer-events: none;
  z-index: 2;
  animation: floatUp 2.5s linear forwards;
}

@keyframes floatUp {
  0% {
    transform: translateY(0) translateX(0) scale(0.5);
    opacity: 1;
  }
  100% {
    transform: translateY(-105vh) translateX(var(--dash-move)) scale(1.2);
    opacity: 0;
  }
}

.box {
  background: #fff0f6;
  padding: 40px;
  border-radius: 30px;
  box-shadow: 0 10px 30px rgba(255, 150, 200, 0.4);
  text-align: center;
  max-width: 500px;
  width: 90%;
  border: 4px solid #ffb6d9;
  position: relative;
  z-index: 1;
}

/* เพิ่มแอนิเมชันกล่องสั่นเมื่อตอบผิด */
.shake {
  animation: shakeEffect 0.4s ease-in-out;
}

@keyframes shakeEffect {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-10px); }
  40%, 80% { transform: translateX(10px); }
}

.box::before {
  content: "🎀";
  position: absolute;
  top: -25px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 40px;
}

h2 {
  color: #ff6fa5;
  font-size: 1.5em;
}

p {
  color: #5b4b8a;
  font-size: 1.1em;
}

/* สไตล์กล่องตัวเลือก */
.choices-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
  align-items: center;
  width: 100%;
}

.choice-btn {
  padding: 14px 20px;
  width: 85%;
  border: 3px solid #a6e3ff;
  border-radius: 20px;
  font-size: 16px;
  background: #f0faff;
  color: #5b4b8a;
  cursor: pointer;
  transition: all 0.2s ease;
  font-weight: 500;
}

.choice-btn:hover {
  background: #ff9ecb;
  color: white;
  border-color: #ffb6d9;
  transform: scale(1.03);
}

/* คลาสพิเศษสำหรับปุ่มสีฟ้าและชมพูในหน้าคั่นกลาง */
.btn-pink {
  background: #fff0f5;
  border-color: #ffb6d9;
  color: #ff6fa5;
}
.btn-pink:hover {
  background: #ffb6d9;
  color: white;
  border-color: #ff9ecb;
}

.btn-blue {
  background: #f0faff;
  border-color: #a6e3ff;
  color: #5b4b8a;
}
.btn-blue:hover {
  background: #a6e3ff;
  color: white;
  border-color: #7ecfff;
}

.wrong {
  color: #ff5c8a;
  display: none;
  margin-top: 15px;
  font-weight: bold;
}

.final h1 {
  color: #ff6fa5;
  font-size: 2em;
  margin-bottom: 20px;
}
</style>
</head>
<body>

<!-- ของตกแต่งลอยพื้นหลัง -->
<div class="deco" style="top:5%; left:10%;">🎀</div>
<div class="deco" style="top:15%; left:80%;">⭐</div>
<div class="deco" style="top:25%; left:5%;">💕</div>
<div class="deco" style="top:70%; left:15%;">🐾</div>
<div class="deco" style="top:80%; left:85%;">🎀</div>
<div class="deco" style="top:10%; left:50%;">⭐</div>
<div class="deco" style="top:60%; left:70%;">💕</div>
<div class="deco" style="top:40%; left:90%;">🐾</div>
<div class="deco" style="top:85%; left:40%;">⭐</div>
<div class="deco" style="top:50%; left:3%;">🎀</div>

<div class="box" id="quizBox">
  <div id="questionArea"></div>
  <p class="wrong" id="wrongMsg">ไม่ใช่คำตอบที่ใช่นะ ลองอีกครั้ง 🎀</p>
</div>

<script>
var QUESTIONS = [
  {
    isWelcome: true,
    question: "ที่รักรักเค้ามากแค่ไหน 💭",
    choices: ["❤️", "❤️❤️", "💖❤️💖❤️💖"],
    answer: "💖❤️💖❤️💖"
  },
  {
    question: "สิ่งไหนที่เค้าทำแล้วที่รักรู้สึกขอบคุณและมีความสุขที่สุด?",
    choices: ["การคอยอยู่ข้างๆ เวลาที่เหนื่อย", "การได้มีหนูอยู่ในชีวิตพี่", "การใส่ใจในเรื่องเล็กๆ น้อยๆ", "ถูกทุกข้อเลย ดีที่สุดในโลก"],
    answer: "" 
  },
  {
    question: "ตลอดเวลาที่ผ่านมา เค้าเป็นแฟนที่ดีสำหรับที่รักหรือยัง?",
    choices: ["ที่สุดแล้ว ขอบคุณนะ", "ดีมากๆ เลย", "ดีแล้ว แต่ดื้อไปหน่อย", "น่ารักที่สุดในโลกเยย"],
    answer: ""
  },
  {
    question: "วันครบรอบปีนี้... ที่รักอยากจับมือเดินทางไปด้วยกันอีกนานแค่ไหน?",
    choices: ["ตลอดไปเลยครับ", "นานจนแก่เลยนะ", "ไปเรื่อยๆ จนกว่าเธอจะเบื่อ", "จับมือกันไปแบบนี้ในทุกๆ วัน"],
    answer: ""
  }
];

var currentIndex = 0;

function spawnHearts() {
  var heartTypes = ["❤️", "💖", "💝", "💕", "💗"];
  for (let i = 0; i < 35; i++) {
    setTimeout(function() {
      var heart = document.createElement("div");
      heart.className = "floating-heart";
      heart.innerText = heartTypes[Math.floor(Math.random() * heartTypes.length)];
      
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.setProperty('--dash-move', (Math.random() * 200 - 100) + "px");
      
      var size = Math.random() * 15 + 15;
      heart.style.fontSize = size + "px";
      heart.style.animationDuration = (Math.random() * 1.5 + 2) + "s";
      
      document.body.appendChild(heart);
      
      setTimeout(function() {
        heart.remove();
      }, 3500);
    }, i * 60);
  }
}

function triggerShake() {
  var box = document.getElementById('quizBox');
  box.classList.remove('shake');
  void box.offsetWidth; 
  box.classList.add('shake');
}

function renderQuestion() {
  var area = document.getElementById('questionArea');
  if (currentIndex < QUESTIONS.length) {
    var q = QUESTIONS[currentIndex];
    
    var choicesHtml = '';
    q.choices.forEach(function(choice, index) {
      var btnId = q.isWelcome ? `welcome-btn-${index}` : '';
      choicesHtml += `<button id="${btnId}" class="choice-btn" onclick="checkAnswer('${choice}', this)">${choice}</button>`;
    });

    if (q.isWelcome) {
      area.innerHTML =
        `<h2>${q.question}</h2>` +
        `<div class="choices-container">${choicesHtml}</div>`;
    } else {
      area.innerHTML =
        `<h2>คำถามที่ ${currentIndex} จาก ${(QUESTIONS.length - 1)} 💭</h2>` +
        `<p>${q.question}</p>` +
        `<div class="choices-container">${choicesHtml}</div>`;
    }
  } else {
    showFinalPage();
  }
}

function checkAnswer(selectedAnswer, element) {
  var q = QUESTIONS[currentIndex];
  var wrongMsg = document.getElementById('wrongMsg');

  if (!q.isWelcome || selectedAnswer === q.answer) {
    wrongMsg.style.display = 'none';
    
    if (q.isWelcome) {
      spawnHearts(); 
      showIntermissionPage();
    } else {
      currentIndex++;
      renderQuestion();
    }
  } else {
    triggerShake(); 
    if (element.innerText === "❤️") {
      element.innerText = "กดผิดแน่ๆ เอาใหม่! 🥺";
    } else if (element.innerText === "❤️❤️") {
      element.innerText = "รักแค่นี้เองหรอ นอยด์นะ 💬";
    }
  }
}

function showIntermissionPage() {
  var area = document.getElementById('questionArea');
  area.innerHTML = 
    `<h2>ที่รักเก่งมาก เค้ารักที่รักที่สุดในโลกเยยย 💐✨</h2>` +
    `<p>ที่รักพร้อมตอบคำถามข้อถัดไปไหม?</p>` +
    `<div class="choices-container">` +
      `<button class="choice-btn btn-blue" onclick="proceedToQuiz()">พร้อม</button>` +
      `<button class="choice-btn btn-pink" onclick="proceedToQuiz()">พร้อม</button>` +
    `</div>`;
}

function proceedToQuiz() {
  currentIndex++;
  renderQuestion();
}

function showFinalPage() {
  var box = document.getElementById('quizBox');
  box.innerHTML =
    '<div class="final">' +
    '<h1>Happy Anniversary! 🎉💕</h1>' +
    '<p>เก่งมากที่ตอบถูกทุกข้อเลยนะ 🎀</p>' +
    '<p>ขอบคุณสำหรับทุกอย่างที่ผ่านมา ขอบคุณที่คอยดูแลและอยู่เคียงข้างกันเสมอนะ</p>' +
    '<p>เค้าโชคดีที่มีพี่เป็นแฟน และอยากโชคดีตลอดไปเลย💖</p>' +
    '<p>— หนูรักพี่นะ และจะรักไปทุ๊กกกทุกวันเลย 🌸</p>' +
    '</div>';
}

renderQuestion();
</script>

</body>
</html>
